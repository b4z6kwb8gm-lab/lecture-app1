<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Hub — HOME</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

/* ===== RESET ===== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #e8dfc8;
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== BACKGROUND ===== */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.bg-stars {
  background:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1px 1px at 70% 18%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.5), transparent),
    radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.4), transparent);
  background-color: #000010;
}

.bg-glow-blue {
  background: radial-gradient(ellipse at bottom, rgba(20,60,160,0.35), transparent 70%);
}

/* ===== ORB ===== */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  animation: float 10s ease-in-out infinite alternate;
  z-index: 0;
}

.orb-1 {
  width: 280px;
  height: 280px;
  background: rgba(60,100,220,0.18);
  top: -80px;
  right: -60px;
}

.orb-2 {
  width: 200px;
  height: 200px;
  background: rgba(180,130,40,0.12);
  bottom: 40px;
  left: -40px;
}

@keyframes float {
  from { transform: translate(0,0) scale(1); }
  to { transform: translate(20px,-30px) scale(1.1); }
}

/* ===== LAYOUT ===== */
#menu-page {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  z-index: 10;
}

/* ===== HEADER ===== */
.menu-header {
  text-align: center;
  margin-bottom: 20px;
}

.menu-eyebrow {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.35em;
  color: rgba(200,170,80,0.75);
}

.menu-title-main {
  font-family: 'Cinzel', serif;
  font-size: clamp(28px,5vw,48px);
  background: linear-gradient(180deg,#fff8e8,#c8aa50,#8a6e20);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== SEARCH ===== */
.search-wrap {
  width: 100%;
  max-width: 420px;
  margin: 20px 0 30px;
  position: relative;
  z-index: 20;
}

.search-box {
  width: 100%;
  padding: 12px 14px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(200,170,80,0.3);
  color: #e8dfc8;
  outline: none;
}

.suggest-box {
  position: absolute;
  top: 48px;
  width: 100%;
  background: rgba(10,10,20,0.95);
  border: 1px solid rgba(200,170,80,0.2);
  display: none;
  flex-direction: column;
}

.suggest-item {
  padding: 10px;
  cursor: pointer;
}

.suggest-item:hover {
  background: rgba(80,150,255,0.15);
}

/* ===== MENU ===== */
.menu-list {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.menu-item {
  position: relative;
  display: flex;
  align-items: center;
  cursor: pointer;
}

.mi-bg {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: .25s;
  background: linear-gradient(90deg,
    rgba(80,150,255,0),
    rgba(80,150,255,0.2),
    rgba(80,150,255,0));
}

.menu-item:hover .mi-bg {
  opacity: 1;
}

.mi-num {
  width: 40px;
  font-family: 'Cinzel', serif;
  text-align: right;
  color: rgba(200,170,80,0.6);
}

.mi-body {
  flex: 1;
  padding: 14px 10px;
}

.mi-round {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(200,170,80,0.6);
}

.mi-title {
  font-size: 18px;
}

/* ===== FOOTER ===== */
.menu-footer {
  margin-top: 40px;
  font-size: 10px;
  letter-spacing: 0.3em;
  color: rgba(200,170,80,0.25);
}
</style>
</head>

<body>

<div class="bg-layer bg-stars"></div>
<div class="bg-layer bg-glow-blue"></div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div id="menu-page">

  <div class="menu-header">
    <div class="menu-eyebrow">Physics Hub</div>
    <div class="menu-title-main">Select Field</div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <input id="search" class="search-box" type="text" placeholder="Search topics...">
    <div id="suggest" class="suggest-box"></div>
  </div>

  <!-- MENU -->
<div class="menu-list">

  <div class="menu-item" onclick="location.href='lectures/mechanics/index.html'">
    <div class="mi-bg"></div>
    <div class="mi-num">01</div>
    <div class="mi-body">
      <div class="mi-round">MECHANICS</div>
      <div class="mi-title">力学</div>
    </div>
  </div>

  <div class="menu-item" onclick="location.href='lectures/statmech/index.html'">
    <div class="mi-bg"></div>
    <div class="mi-num">02</div>
    <div class="mi-body">
      <div class="mi-round">STAT MECH</div>
      <div class="mi-title">統計力学</div>
    </div>
  </div>

  <div class="menu-item" onclick="location.href='lectures/experiments/index.html'">
    <div class="mi-bg"></div>
    <div class="mi-num">03</div>
    <div class="mi-body">
      <div class="mi-round">EXPERIMENT</div>
      <div class="mi-title">実験</div>
    </div>
  </div>

  <div class="menu-item" onclick="location.href='quantum/index.html'">
    <div class="mi-bg"></div>
    <div class="mi-num">04</div>
    <div class="mi-body">
      <div class="mi-round">QUANTUM</div>
      <div class="mi-title">量子力学</div>
    </div>
  </div>

</div> <!-- menu-listここで閉じる -->

<div class="menu-footer">
  Physics Navigation System
</div>

<script>

const data = [
  { key:"力学", link:"lectures/mechanics/index.html" },
  { key:"運動", link:"lectures/mechanics/index.html" },

  { key:"統計力学", link:"lectures/statmech/index.html" },
  { key:"エントロピー", link:"lectures/statmech/index.html" },

  { key:"実験", link:"lectures/experiments/index.html" },
  { key:"誤差", link:"lectures/experiments/index.html" },
  { key:"データ", link:"lectures/experiments/index.html" }
];

const input = document.getElementById("search");
const suggest = document.getElementById("suggest");

input.addEventListener("input", () => {
  const q = input.value.trim();
  suggest.innerHTML = "";

  if (!q) {
    suggest.style.display = "none";
    return;
  }

  const res = data.filter(d => d.key.includes(q));

  if (res.length === 0) {
    suggest.style.display = "none";
    return;
  }

  res.forEach(r => {
    const div = document.createElement("div");
    div.className = "suggest-item";
    div.textContent = r.key;
    div.onclick = () => location.href = r.link;
    suggest.appendChild(div);
  });

  suggest.style.display = "flex";
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-wrap")) {
    suggest.style.display = "none";
  }
});

</script>

</body>
</html>
