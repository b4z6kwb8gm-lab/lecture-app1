<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lecture Stream</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #141a22, #0b0f14);
    color: white;
}

/* ヘッダー */
header {
    padding: 40px 20px 10px;
}

h1 {
    margin: 0;
    font-size: 28px;
}

p {
    opacity: 0.6;
    margin-top: 5px;
}

/* 検索 */
.search-box {
    padding: 0 20px 10px;
}

#search {
    width: 100%;
    padding: 12px 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
    background: rgba(255,255,255,0.08);
    color: white;
    backdrop-filter: blur(10px);
}

#search::placeholder {
    color: rgba(255,255,255,0.4);
}

/* カード */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 25px;
    border-radius: 16px;
    text-align: center;
    cursor: pointer;
    transition: 0.25s;
    backdrop-filter: blur(10px);
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.1);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.card span {
    font-size: 18px;
    font-weight: bold;
}

footer {
    text-align: center;
    opacity: 0.4;
    font-size: 12px;
    padding: 30px;
}
</style>

</head>

<body>

<header>
    <h1>Lecture Stream</h1>
    <p>学習コンテンツダッシュボード</p>
</header>

<!-- 検索バー -->
<div class="search-box">
    <input type="text" id="search" placeholder="講義を検索...">
</div>

<!-- カード一覧 -->
<div class="container">

    <div class="card" onclick="openLecture('lecture1.html')">
        <span>講義1</span>
    </div>

    <div class="card" onclick="openLecture('lecture2.html')">
        <span>講義2</span>
    </div>

    <div class="card" onclick="openLecture('lecture3.html')">
        <span>講義3</span>
    </div>

    <div class="card" onclick="openLecture('lecture4.html')">
        <span>講義4</span>
    </div>

    <div class="card" onclick="openLecture('lecture5.html')">
        <span>講義5</span>
    </div>

    <div class="card" onclick="openLecture('lecture6.html')">
        <span>講義6</span>
    </div>

</div>

<footer>
    Lecture Stream v1.0
</footer>

<script>
function openLecture(file) {
    window.location.href = "lectures/" + file;
}

/* 検索フィルター */
const searchInput = document.getElementById("search");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("input", function () {
    const keyword = this.value.toLowerCase();

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();

        if (text.includes(keyword)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
});
</script>

</body>
</html>
