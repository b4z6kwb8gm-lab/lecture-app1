<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Lecture Stream</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon.png">

<style>

*{
    box-sizing:border-box;
}

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #050014;
    color: white;
}

/* ===== タイトル ===== */
h2, h3 {
    text-align: center;
    color: #ffd700;
    margin-bottom: 20px;
}

/* ===== 検索 ===== */
.search {
    width: calc(100% - 40px);
    max-width: 500px;
    display: block;
    margin: 10px auto 20px;

    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 16px;
}

/* ===== メニュー ===== */
.menu {
    padding: 18px;
    margin: 12px 20px;
    border-radius: 16px;
    background: linear-gradient(135deg, #ffd700, #6a00ff);
    font-weight: bold;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 0 10px rgba(255,215,0,0.4);
}

.menu:active {
    transform: scale(0.98);
}

/* ===== 講義 ===== */
.lecture {
    padding: 14px;
    margin: 8px 0;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    transition: 0.2s;
}

.lecture:hover {
    background: rgba(255,255,255,0.18);
    transform: translateX(6px);
}

/* ===== 戻る ===== */
.back {
    margin-bottom: 20px;
    opacity: 0.7;
    cursor: pointer;
}

.back:hover {
    opacity: 1;
    color: #ffd700;
}

.view {
    display: none;
    padding: 20px;
}

.view.active {
    display: block;
}

</style>
</head>

<body>

<!-- ================= HOME ================= -->
<div id="home" class="view active">

<h2>Lecture Stream</h2>

<input id="search" class="search" placeholder="検索（力学・統計・実験・講義）">

<div class="menu" onclick="show('mechanics')">
⚙️ 力学演習
</div>

<div class="menu" onclick="show('statmech')">
📊 統計力学
</div>

<div class="menu" onclick="location.href='lectures/experiments/index.html'">
🧪 実験
</div>

</div>

<!-- ================= mechanics ================= -->
<div id="mechanics" class="view">

<div class="back" onclick="show('home')">← ホーム</div>
<h3>力学演習</h3>

<div class="lecture" onclick="openLecture('mechanics/lecture1.html')">講義1</div>
<div class="lecture" onclick="openLecture('mechanics/lecture2.html')">講義2</div>
<div class="lecture" onclick="openLecture('mechanics/lecture3.html')">講義3</div>
<div class="lecture" onclick="openLecture('mechanics/lecture4.html')">講義4</div>
<div class="lecture" onclick="openLecture('mechanics/lecture5.html')">講義5</div>
<div class="lecture" onclick="openLecture('mechanics/lecture6.html')">講義6</div>

</div>

<!-- ================= statmech ================= -->
<div id="statmech" class="view">

<div class="back" onclick="show('home')">← ホーム</div>
<h3>統計力学</h3>

<div class="lecture" onclick="openLecture('statmech/lecture1.html')">講義1</div>
<div class="lecture" onclick="openLecture('statmech/lecture2.html')">講義2</div>
<div class="lecture" onclick="openLecture('statmech/lecture3.html')">講義3</div>
<div class="lecture" onclick="openLecture('statmech/lecture4.html')">講義4</div>
<div class="lecture" onclick="openLecture('statmech/lecture5.html')">講義5</div>
<div class="lecture" onclick="openLecture('statmech/lecture6.html')">講義6</div>

</div>

<script>

/* ===== 画面切替 ===== */
function show(id){
    document.querySelectorAll('.view').forEach(v=>{
        v.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
}

/* ===== 講義遷移 ===== */
function openLecture(path){
    location.href = "lectures/" + path;
}

/* ===== 検索 ===== */
document.getElementById("search").addEventListener("input", function(){

    const v = this.value.toLowerCase();

    document.querySelectorAll(".menu, .lecture").forEach(el=>{

        const text = el.textContent.toLowerCase();

        el.style.display = text.includes(v) ? "block" : "none";

    });

});

</script>

</body>
</html>
