<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lecture Stream</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#050505">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
/* ===== 基本背景（スパイダーマン風ダーク＋赤黒グロー） ===== */
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at 30% 10%, #1a0000, #050505 60%);
    color: #f5f5f5;
    overflow-x: hidden;
}

/* ===== 上部ヒーローエリア ===== */
.hero {
    position: relative;
    height: 32vh;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* 光の粒 */
.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.15), transparent 60%);
    animation: pulse 4s infinite ease-in-out;
}

@keyframes pulse {
    0%,100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.2); opacity: 0.8; }
}

h1 {
    margin: 0;
    font-size: 34px;
    letter-spacing: 2px;
    color: #d4af37;
    text-shadow: 0 0 15px rgba(212,175,55,0.4);
}

p {
    opacity: 0.6;
}

/* ===== 検索（はみ出し完全防止） ===== */
.search-wrap {
    padding: 10px 16px;
}

#search {
    width: 100%;
    box-sizing: border-box;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(212,175,55,0.4);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
    transition: 0.3s;
}

#search:focus {
    border-color: #d4af37;
    box-shadow: 0 0 18px rgba(212,175,55,0.25);
}

/* ===== コンテナ（余白＋縦幅対策） ===== */
.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 16px;
    padding: 16px;
    padding-bottom: 60px;
}

/* ===== カード（スパイダーマン風浮遊UI） ===== */
.card {
    position: relative;
    background: linear-gradient(145deg, rgba(255,255,255,0.06), rgba(0,0,0,0.5));
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 18px;
    padding: 26px;
    text-align: center;
    cursor: pointer;
    overflow: hidden;
    transition: 0.35s;
    transform-style: preserve-3d;
}

/* 浮遊アニメ */
.card {
    animation: float 6s infinite ease-in-out;
}

@keyframes float {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
}

/* ホバー */
.card:hover {
    transform: translateY(-10px) scale(1.06);
    border-color: rgba(212,175,55,0.8);
    box-shadow: 0 0 25px rgba(212,175,55,0.35);
}

/* 金のスパイダーライン風エフェクト */
.card::before {
    content: "";
    position: absolute;
    top: -60%;
    left: -60%;
    width: 220%;
    height: 220%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(212,175,55,0.12),
        transparent
    );
    transform: rotate(25deg);
    animation: shine 5s infinite linear;
}

@keyframes shine {
    0% { transform: translateX(-120%) rotate(25deg); }
    100% { transform: translateX(120%) rotate(25deg); }
}

.card span {
    position: relative;
    z-index: 2;
    font-size: 18px;
    font-weight: bold;
}

/* ===== フッター ===== */
footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    opacity: 0.4;
}
</style>

</head>

<body>

<div class="hero">
    <h1>Lecture Stream</h1>
    <p>Spider-style Learning Interface</p>
</div>

<!-- 検索 -->
<div class="search-wrap">
    <input type="text" id="search" placeholder="講義を検索...">
</div>

<!-- カード -->
<div class="container">

    <div class="card" onclick="openLecture('lecture1.html')"><span>講義1</span></div>
    <div class="card" onclick="openLecture('lecture2.html')"><span>講義2</span></div>
    <div class="card" onclick="openLecture('lecture3.html')"><span>講義3</span></div>
    <div class="card" onclick="openLecture('lecture4.html')"><span>講義4</span></div>
    <div class="card" onclick="openLecture('lecture5.html')"><span>講義5</span></div>
    <div class="card" onclick="openLecture('lecture6.html')"><span>講義6</span></div>

</div>

<footer>
    Lecture Stream • Spider Edition
</footer>

<script>
function openLecture(file) {
    window.location.href = "lectures/" + file;
}

/* 検索 */
const searchInput = document.getElementById("search");
const cards = document.querySelectorAll(".card");

searchInput.addEventListener("input", function () {
    const keyword = this.value.toLowerCase();

    cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        card.style.display = text.includes(keyword) ? "block" : "none";
    });
});
</script>

</body>
</html>
