<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiments Library</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #e8dfc8;
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
}

.bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
}

.bg-stars { background: #000010; }
.bg-glow-blue { background: radial-gradient(ellipse at bottom, rgba(20,60,160,0.35), transparent 70%); }
.bg-glow-gold { background: radial-gradient(ellipse at top, rgba(180,130,40,0.12), transparent 70%); }

.page {
  position: relative;
  z-index: 10;
  min-height: 100vh;
  padding: 60px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.title {
  font-family: 'Cinzel', serif;
  font-size: 42px;
  background: linear-gradient(180deg,#fff8e8,#c8aa50,#8a6e20);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sub {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.3em;
  color: rgba(200,170,80,0.6);
}

.grid {
  width: 100%;
  max-width: 1000px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
}

.card {
  padding: 16px;
  border: 1px solid rgba(200,170,80,0.2);
  background: rgba(0,0,0,0.3);
  transition: 0.2s;
  cursor: pointer;
}

.card:hover {
  background: rgba(80,150,255,0.12);
  border-color: rgba(80,150,255,0.4);
  transform: translateY(-3px);
}

.card h2 {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  margin-bottom: 6px;
}

.card p {
  font-size: 12px;
  color: rgba(200,170,80,0.6);
}

.back {
  margin-top: 40px;
  font-size: 12px;
  color: rgba(200,170,80,0.5);
  cursor: pointer;
}

.back:hover {
  color: #fff;
}

/* ===== SEARCH ===== */
.search-wrap{
  width:100%;
  max-width:600px;
  margin:0 auto 30px;
  position:relative;
}

.search-box{
  width:100%;
  padding:14px;
  border:1px solid rgba(200,170,80,0.25);
  background:rgba(0,0,0,0.45);
  color:#fff;
  font-size:15px;
  outline:none;
}

.search-box:focus{
  border-color:rgba(255,215,0,0.5);
}

.suggest-box{
  position:absolute;
  top:100%;
  left:0;
  right:0;
  background:rgba(10,10,20,0.97);
  border:1px solid rgba(200,170,80,0.2);
  display:none;
  flex-direction:column;
  z-index:100;
}

.suggest-item{
  padding:12px;
  cursor:pointer;
}

.suggest-item:hover{
  background:rgba(80,150,255,0.15);
}
</style>
</head>

<script>
const data = [
  { key:"OPアンプ", link:"opamp/index.html" },
  { key:"X線による結晶の方位決定", link:"xray_orientation/index.html" },
  { key:"サーミスタの特性", link:"thermistor/index.html" },
  { key:"デジタル回路", link:"digital_circuits/index.html" },
  { key:"はんだ付け", link:"soldering/index.html" },
  { key:"強磁性体", link:"ferromagnetism/index.html" },
  { key:"高温超伝導体", link:"high_tc_superconductor/index.html" },
  { key:"光の回折", link:"diffraction/index.html" },
  { key:"示差熱分析", link:"dta/index.html" },
  { key:"真空蒸着", link:"vacuum_deposition/index.html" },
  { key:"ホール効果", link:"hall_effect/index.html" },
  { key:"偏光", link:"polarization/index.html" }
];

const input = document.getElementById("search");
const suggest = document.getElementById("suggest");

input.addEventListener("input", () => {
  const q = input.value.trim();
  suggest.innerHTML = "";

  if(!q){
    suggest.style.display = "none";
    return;
  }

  const results = data.filter(d =>
    d.key.toLowerCase().includes(q.toLowerCase())
  );

  if(results.length === 0){
    suggest.style.display = "none";
    return;
  }

  results.forEach(r => {
    const div = document.createElement("div");
    div.className = "suggest-item";
    div.textContent = r.key;

    div.onclick = () => {
      location.href = r.link;
    };

    suggest.appendChild(div);
  });

  suggest.style.display = "flex";
});

document.addEventListener("click", e => {
  if(!e.target.closest(".search-wrap")){
    suggest.style.display = "none";
  }
});
</script>

<body>

<div class="bg-layer bg-stars"></div>
<div class="bg-layer bg-glow-blue"></div>
<div class="bg-layer bg-glow-gold"></div>

<div class="page">

  <div class="header">
    <div class="title">Experiments</div>
    <div class="sub">実験・データ解析</div>
  </div>

 <!-- SEARCH -->
  <div class="search-wrap">
   <input
    id="search"
    class="search-box"
    type="text"
    placeholder="実験名を検索..."
   >
   <div id="suggest" class="suggest-box"></div>
  </div>

  <div class="grid">

    <div class="card" onclick="location.href='opamp/index.html'">
      <h2>OPアンプ</h2>
      <p>増幅回路・演算増幅器の特性解析</p>
    </div>

    <div class="card" onclick="location.href='xray_orientation/index.html'">
      <h2>X線による結晶の方位決定</h2>
      <p>X線回折を用いた結晶構造解析</p>
    </div>

    <div class="card" onclick="location.href='thermistor/index.html'">
      <h2>サーミスタの特性</h2>
      <p>温度依存性と抵抗変化の測定</p>
    </div>

    <div class="card" onclick="location.href='digital_circuits/index.html'">
      <h2>デジタル回路</h2>
      <p>論理回路設計と動作検証</p>
    </div>

    <div class="card" onclick="location.href='soldering/index.html'">
      <h2>はんだ付け</h2>
      <p>電子工作基礎技術</p>
    </div>

    <div class="card" onclick="location.href='ferromagnetism/index.html'">
      <h2>強磁性体</h2>
      <p>磁化特性とヒステリシス</p>
    </div>

    <div class="card" onclick="location.href='high_tc_superconductor/index.html'">
      <h2>高温超伝導体</h2>
      <p>超伝導転移と抵抗測定</p>
    </div>

    <div class="card" onclick="location.href='diffraction/index.html'">
      <h2>光の回折</h2>
      <p>干渉・回折パターン解析</p>
    </div>

    <div class="card" onclick="location.href='dta/index.html'">
      <h2>示差熱分析</h2>
      <p>熱物性測定と相変化解析</p>
    </div>

    <div class="card" onclick="location.href='vacuum_deposition/index.html'">
      <h2>真空蒸着</h2>
      <p>薄膜形成プロセス</p>
    </div>

    <div class="card" onclick="location.href='hall_effect/index.html'">
      <h2>ホール効果</h2>
      <p>キャリア濃度と移動度測定</p>
    </div>

    <div class="card" onclick="location.href='polarization/index.html'">
      <h2>偏光</h2>
      <p>光の偏光特性解析</p>
    </div>

  </div>

   <div class="back" onclick="location.href='../../index.html'">← HOME</div>

  </div>

</div>

</body>
</html>
