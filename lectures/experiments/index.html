<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実験ライブラリ</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    min-height:100vh;
    background:
    radial-gradient(circle at top,
    #2b2b2b 0%,
    #0b0f14 45%,
    #000000 100%);
    color:white;
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;
    padding:90px 20px 30px;
}
/* ===== 戻るボタン ===== */
.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    z-index:9999;
    border:none;
    padding:12px 20px;
    border-radius:16px;
    background:#ffd700;
    color:black;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
    box-shadow:
    0 0 15px rgba(255,215,0,.5);
    transition:.25s;
}
.back-btn:hover{
    transform:scale(1.05);
    box-shadow:
    0 0 25px rgba(255,215,0,.8);
}
/* ===== タイトル ===== */
.header{
    text-align:center;
    margin-bottom:35px;
}
.header h1{
    color:#ffd700;
    font-size:2.3rem;
    text-shadow:
    0 0 10px rgba(255,215,0,.7),
    0 0 30px rgba(255,215,0,.4);
    margin-bottom:10px;
}
.header p{
    opacity:.8;
}
/* ===== 実験一覧 ===== */
.grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));
    gap:18px;
}
.card{
    background:
    rgba(255,255,255,.04);
    backdrop-filter:blur(10px);
    border:
    1px solid rgba(255,215,0,.25);
    border-radius:22px;
    padding:22px;
    transition:.3s;
    box-shadow:
    0 0 20px rgba(255,215,0,.05);
}
.card:hover{
    transform:
    translateY(-5px);
    box-shadow:
    0 0 25px rgba(255,215,0,.25);
}
.card h2{
    color:#ffd700;
    font-size:1.1rem;
    margin-bottom:15px;
}
/* ===== 開くボタン ===== */
.open-btn{
    display:block;
    text-align:center;
    text-decoration:none;
    background:#ffd700;
    color:black;
    font-weight:bold;
    padding:14px;
    border-radius:14px;
    transition:.25s;
}
.open-btn:hover{
    transform:scale(1.03);
    filter:brightness(1.05);
}
</style>
</head>
