@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#e8dfc8;
    font-family:'Noto Sans JP',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
}

/* ===== 背景 ===== */

.bg-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.bg-stars{
    background:
    radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,.6), transparent 100%),
    radial-gradient(1px 1px at 40% 8%, rgba(255,255,255,.7), transparent 100%),
    radial-gradient(1px 1px at 70% 18%, rgba(255,255,255,.4), transparent 100%),
    radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,.5), transparent 100%);
    background-color:#000010;
}

.bg-glow-blue{
    background:
    radial-gradient(
        ellipse at bottom,
        rgba(20,60,160,.35),
        transparent 70%);
}

.bg-glow-gold{
    background:
    radial-gradient(
        ellipse at top,
        rgba(180,130,40,.12),
        transparent 70%);
}

.orb{
    position:fixed;
    border-radius:50%;
    filter:blur(60px);
}

.orb-1{
    width:280px;
    height:280px;
    background:rgba(60,100,220,.18);
    top:-80px;
    right:-60px;
}

.orb-2{
    width:200px;
    height:200px;
    background:rgba(180,130,40,.12);
    bottom:40px;
    left:-40px;
}

/* ===== レイアウト ===== */

.container{
    position:relative;
    z-index:10;
    max-width:700px;
    margin:auto;
    padding:40px 20px;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.eyebrow{
    font-family:'Cinzel',serif;
    font-size:11px;
    letter-spacing:.35em;
    color:rgba(200,170,80,.75);
}

.title{
    font-family:'Cinzel',serif;
    font-size:clamp(28px,5vw,48px);
    background:
    linear-gradient(
        180deg,
        #fff8e8,
        #c8aa50,
        #8a6e20);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ===== 戻る ===== */

.back-btn{
    display:inline-block;
    margin-bottom:25px;
    color:#c8aa50;
    text-decoration:none;
    font-family:'Cinzel',serif;
    letter-spacing:.1em;
}

.back-btn:hover{
    opacity:.8;
}

/* ===== 講義一覧 ===== */

.list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.item{
    position:relative;
    cursor:pointer;
}

.item-bg{
    position:absolute;
    inset:0;
    opacity:0;
    transition:.25s;
    background:
    linear-gradient(
        90deg,
        rgba(50,100,230,0),
        rgba(80,150,255,.2),
        rgba(50,100,230,0));
}

.item:hover .item-bg{
    opacity:1;
}

.item-inner{
    position:relative;
    padding:16px;
}

.item-num{
    font-family:'Cinzel',serif;
    color:rgba(200,170,80,.6);
    font-size:11px;
}

.item-title{
    font-size:18px;
}

.footer{
    margin-top:40px;
    text-align:center;
    font-family:'Cinzel',serif;
    font-size:10px;
    letter-spacing:.3em;
    color:rgba(200,170,80,.25);
}
</style>
</head>
